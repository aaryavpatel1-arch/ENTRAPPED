<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRAPPED: COMBAT INITIATION</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; border: 2px solid #ffffff;
            transform: translate(-50%, -50%); pointer-events: none;
            box-shadow: 0 0 5px #000000; z-index: 10; border-radius: 50%;
        }

        #hud {
            position: absolute; top: 20px; left: 20px;
            color: #ffffff; z-index: 10; background: rgba(0, 0, 0, 0.7);
            padding: 15px 22px; border: 1px solid #00aaff;
            box-shadow: inset 0 0 10px rgba(0, 170, 255, 0.2);
            backdrop-filter: blur(4px);
        }
        #hud div { margin-bottom: 5px; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; text-shadow: 1px 1px 0 #000; }
        #hud span { color: #00ffcc; }

        #health-bar-container { width: 200px; height: 18px; background: #222; border: 2px solid #fff; margin-top: 6px; box-shadow: 2px 2px 0 #000; }
        #health-bar { width: 100%; height: 100%; background: #00ff66; transition: width 0.1s linear, background-color 0.2s; }

        #style-container {
            position: absolute; top: 20px; right: 25px; z-index: 10;
            text-align: right; pointer-events: none;
        }
        #style-rank {
            font-family: 'Impact', sans-serif; font-size: 56px; color: #ffcc00; 
            text-shadow: 4px 4px 0 #000, 0 0 15px #ffcc00;
            letter-spacing: 2px; font-style: italic; transition: transform 0.1s;
            -webkit-text-stroke: 2px black;
        }
        #style-bar-bg { width: 220px; height: 10px; background: rgba(0,0,0,0.8); margin-left: auto; border: 1px solid #fff; box-shadow: 2px 2px 0 #000; }
        #style-bar-fill { width: 0%; height: 100%; background: #ffcc00; transition: width 0.1s linear; }
        #style-feed { font-size: 16px; color: #ffffff; text-shadow: 1px 1px 0 #000; display: flex; flex-direction: column; align-items: flex-end; margin-top: 10px; font-family: 'Arial Black', sans-serif; }
        .feed-item { animation: slideOut 2s forwards; }
        @keyframes slideOut { 0% { opacity: 1; transform: translateX(-10px); } 70% { opacity: 1; transform: translateX(-10px); } 100% { opacity: 0; transform: translateX(20px); } }

        #boss-banner {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center; display: none; background: rgba(0,0,0,0.6); padding: 10px 20px; border: 1px solid #ff0055;
        }
        #boss-title { font-family: 'Impact', sans-serif; color: #ff0055; font-size: 32px; letter-spacing: 4px; text-shadow: 2px 2px 0 #000; -webkit-text-stroke: 1px white; }
        #boss-hp-bg { width: 500px; height: 20px; background: #111; border: 2px solid #fff; margin-top: 8px; box-shadow: 2px 2px 0 #000; }
        #boss-hp-fill { width: 100%; height: 100%; background: #ff0055; transition: width 0.1s linear; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ffffff; z-index: 20; text-align: center; cursor: pointer;
        }
        #overlay h1 { font-family: 'Impact', sans-serif; font-size: 6rem; margin: 0; color: #fff; text-shadow: 6px 6px 0px #00aaff, -2px -2px 0 #000; letter-spacing: 4px; }
        #overlay .subtitle { font-size: 1.5rem; color: #00ffcc; margin-bottom: 30px; letter-spacing: 2px; background: rgba(0,0,0,0.5); padding: 5px 15px; border: 1px solid #00ffcc; }
        #overlay .btn { padding: 15px 40px; background: #000; color: #00aaff; font-size: 1.5rem; border: 2px solid #00aaff; box-shadow: 4px 4px 0 #00aaff; transition: all 0.1s; }
        #overlay .btn:hover { background: #00aaff; color: #000; transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #0077bb; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.4); pointer-events: none; opacity: 0; z-index: 15; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="damage-flash"></div>
    
    <div id="hud">
        <div>WAVE: <span id="level-val">1</span> / 10</div>
        <div>ENEMIES: <span id="enemy-val">0</span></div>
        <div>WEAPON: <span id="weapon-val">SWORD</span></div>
        <div id="health-bar-container"><div id="health-bar"></div></div>
        <div style="font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.6;">
            [1] Classic Sword<br>
            [2] Rocket Tube<br>
            [3] Slingshot (Revolver)<br>
            [E] Toss Coin | [F] Block Wall<br>
            [SHIFT] Dash | [SPACE] Jump
        </div>
    </div>

    <div id="boss-banner">
        <div id="boss-title">THE JUGGERNAUT</div>
        <div id="boss-hp-bg"><div id="boss-hp-fill"></div></div>
    </div>

    <div id="style-container">
        <div id="style-rank">DESTRUCTIVE</div>
        <div id="style-bar-bg"><div id="style-bar-fill"></div></div>
        <div id="style-feed"></div>
    </div>

    <div id="overlay">
        <h1>COMBAT INITIATION</h1>
        <div class="subtitle">RETRO SURVIVAL ARENA</div>
        <div class="btn" id="start-btn">CLICK TO PLAY</div>
    </div>

    <script>
        // --- ENGINE CONFIG & GLOBALS ---
        const clock = new THREE.Clock();
        let deltaTime = 0;
        let isPointerLocked = false;
        
        // --- SCENE SETUP (Crossroads Sunset Vibe) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xff8844); // Sunset orange
        scene.fog = new THREE.FogExp2(0xff8844, 0.012);
        
        const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Disable antialias for retro crunchy look
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); // Force pixelated look slightly
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.BasicShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffddbb, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 0.9);
        dirLight.position.set(50, 80, -30);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100; dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -100; dirLight.shadow.camera.right = 100;
        dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- PROCEDURAL ROBLOX STUD TEXTURE ---
        function createStudTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            // Base green
            ctx.fillStyle = '#175c17'; ctx.fillRect(0, 0, 64, 64);
            // Block border
            ctx.strokeStyle = '#0f3d0f'; ctx.lineWidth = 2; ctx.strokeRect(0, 0, 64, 64);
            // Stud circle
            ctx.fillStyle = '#1b6e1b';
            ctx.beginPath(); ctx.arc(32, 32, 18, 0, Math.PI * 2); ctx.fill();
            // Stud highlight
            ctx.strokeStyle = '#238a23'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(32, 32, 14, 0, Math.PI); ctx.stroke();
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(60, 60);
            tex.magFilter = THREE.NearestFilter; // Pixelated textures
            return tex;
        }

        const classicStudTex = createStudTexture();

        // --- GAME MANAGERS ---
        const entities = [];
        const particles = [];
        const projectiles = [];
        const gibs = []; // Physical body parts
        let mapObjects = [];
        let coins = [];

        // Screen Shake
        let shakeIntensity = 0;
        function applyScreenShake() {
            if (shakeIntensity > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity -= deltaTime * 5;
                if (shakeIntensity < 0) shakeIntensity = 0;
            }
        }

        // --- STYLE SYSTEM ---
        let styleScore = 0;
        const Ranks = [
            { min: 0, name: "DESTRUCTIVE", color: "#00aaff" },
            { min: 400, name: "CARNAGE", color: "#00ff66" },
            { min: 1000, name: "BRUTAL", color: "#ffcc00" },
            { min: 2000, name: "SADISTIC", color: "#ff6600" },
            { min: 3500, name: "ULTRAKILL", color: "#ff0055" }
        ];
        function addStyle(text, pts) {
            styleScore += pts;
            const feed = document.getElementById('style-feed');
            const item = document.createElement('div');
            item.className = 'feed-item';
            item.innerHTML = `<span style="color:#aaa;">+${pts}</span> ${text}`;
            feed.prepend(item);
            setTimeout(() => item.remove(), 2000);
            document.getElementById('style-rank').style.transform = 'scale(1.2) rotate(-2deg)';
            setTimeout(() => document.getElementById('style-rank').style.transform = 'scale(1) rotate(0deg)', 100);
        }
        function updateStyleMeter() {
            styleScore = Math.max(0, styleScore - deltaTime * 120);
            let currentRank = Ranks[0], nextRank = Ranks[1];
            for (let i = 0; i < Ranks.length; i++) {
                if (styleScore >= Ranks[i].min) {
                    currentRank = Ranks[i];
                    nextRank = Ranks[i+1] || {min: currentRank.min + 2000};
                }
            }
            const rankEl = document.getElementById('style-rank');
            rankEl.innerText = currentRank.name;
            rankEl.style.color = currentRank.color;
            rankEl.style.textShadow = `4px 4px 0 #000, 0 0 15px ${currentRank.color}`;
            
            const progress = (styleScore - currentRank.min) / (nextRank.min - currentRank.min);
            document.getElementById('style-bar-fill').style.width = `${Math.min(100, progress * 100)}%`;
            document.getElementById('style-bar-fill').style.backgroundColor = currentRank.color;
        }

        // --- PLAYER CLASS ---
        class Player {
            constructor() {
                this.height = 3.0; // Taller retro scale
                this.hp = 100;
                this.vel = new THREE.Vector3();
                this.isGrounded = false;
                this.jumpCount = 0;
                this.speed = 35;
                this.friction = 12;
                this.gravity = 60;
                this.jumpForce = 22;
                
                this.weaponGroup = new THREE.Group();
                camera.add(this.weaponGroup);
                scene.add(camera);
                
                // 1. Classic Linked Sword
                this.sword = new THREE.Group();
                const sBlade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.8, 0.3), new THREE.MeshLambertMaterial({color: 0x999999}));
                sBlade.position.y = 0.9;
                const sHilt = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.5), new THREE.MeshLambertMaterial({color: 0x222222}));
                const sHandle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshLambertMaterial({color: 0x555555}));
                sHandle.position.y = -0.3;
                this.sword.add(sBlade, sHilt, sHandle);
                this.sword.position.set(0.6, -0.6, -0.8);
                this.sword.rotation.set(Math.PI/3, 0, 0);
                this.weaponGroup.add(this.sword);
                
                // 2. Classic Rocket Tube
                this.rocket = new THREE.Group();
                const rTube = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.5, 8), new THREE.MeshLambertMaterial({color: 0x444444}));
                rTube.rotation.x = Math.PI/2;
                const rTip = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.3, 8), new THREE.MeshLambertMaterial({color: 0x226622}));
                rTip.rotation.x = Math.PI/2; rTip.position.z = -0.7;
                this.rocket.add(rTube, rTip);
                this.rocket.position.set(0.5, -0.5, -0.8);
                this.rocket.visible = false;
                this.weaponGroup.add(this.rocket);

                // 3. Classic Slingshot
                this.revolver = new THREE.Group();
                const slHandle = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.15), new THREE.MeshLambertMaterial({color: 0x8b4513}));
                const slLeft = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshLambertMaterial({color: 0x8b4513}));
                slLeft.position.set(-0.2, 0.4, 0); slLeft.rotation.z = -0.4;
                const slRight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshLambertMaterial({color: 0x8b4513}));
                slRight.position.set(0.2, 0.4, 0); slRight.rotation.z = 0.4;
                const slBand = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.05), new THREE.MeshBasicMaterial({color: 0x222222}));
                slBand.position.set(0, 0.55, 0);
                this.revolver.add(slHandle, slLeft, slRight, slBand);
                this.revolver.position.set(0.5, -0.5, -0.8);
                this.revolver.rotation.set(-0.2, 0, 0);
                this.revolver.visible = false;
                this.weaponGroup.add(this.revolver);

                this.currentWeapon = 'sword';
                this.attackTimer = 0;
            }

            switchWeapon(w) {
                this.currentWeapon = w;
                this.sword.visible = (w === 'sword');
                this.rocket.visible = (w === 'rocket');
                this.revolver.visible = (w === 'revolver');
                document.getElementById('weapon-val').innerText = w.toUpperCase();
            }

            takeDamage(amt) {
                this.hp -= amt;
                document.getElementById('health-bar').style.width = Math.max(0, this.hp) + '%';
                document.getElementById('health-bar').style.backgroundColor = this.hp < 30 ? '#ff0000' : '#00ff66';
                
                const flash = document.getElementById('damage-flash');
                flash.style.opacity = '1';
                setTimeout(() => flash.style.opacity = '0', 150);
                shakeIntensity = 0.6;

                if (this.hp <= 0) {
                    alert('OOF! You have been dismantled. Restarting Wave 1.');
                    this.hp = 100;
                    GameMode.level = 1;
                    GameMode.generateWave();
                }
            }

            updatePhysics() {
                this.vel.y -= this.gravity * deltaTime;
                
                const dir = new THREE.Vector3();
                if (keys['KeyW']) dir.z -= 1;
                if (keys['KeyS']) dir.z += 1;
                if (keys['KeyA']) dir.x -= 1;
                if (keys['KeyD']) dir.x += 1;
                dir.normalize();
                dir.applyQuaternion(camera.quaternion);
                dir.y = 0;
                dir.normalize();

                if (dir.lengthSq() > 0) {
                    this.vel.x += dir.x * this.speed * deltaTime;
                    this.vel.z += dir.z * this.speed * deltaTime;
                }

                if (this.isGrounded) {
                    this.vel.x -= this.vel.x * this.friction * deltaTime;
                    this.vel.z -= this.vel.z * this.friction * deltaTime;
                } else {
                    this.vel.x -= this.vel.x * (this.friction * 0.15) * deltaTime;
                    this.vel.z -= this.vel.z * (this.friction * 0.15) * deltaTime;
                }

                camera.position.addScaledVector(this.vel, deltaTime);

                if (camera.position.y <= this.height) {
                    camera.position.y = this.height;
                    this.vel.y = 0;
                    this.isGrounded = true;
                    this.jumpCount = 0;
                } else {
                    this.isGrounded = false;
                }

                if (this.attackTimer > 0) this.attackTimer -= deltaTime;
                
                // Animations
                if(this.currentWeapon === 'sword') {
                    this.sword.rotation.z = THREE.MathUtils.lerp(this.sword.rotation.z, 0, 15 * deltaTime);
                    this.sword.rotation.x = THREE.MathUtils.lerp(this.sword.rotation.x, Math.PI/3, 15 * deltaTime);
                }
                if(this.currentWeapon === 'rocket') {
                    this.rocket.position.z = THREE.MathUtils.lerp(this.rocket.position.z, -0.8, 10 * deltaTime);
                    this.rocket.rotation.x = THREE.MathUtils.lerp(this.rocket.rotation.x, 0, 10 * deltaTime);
                }
                if(this.currentWeapon === 'revolver') {
                    this.revolver.position.z = THREE.MathUtils.lerp(this.revolver.position.z, -0.8, 15 * deltaTime);
                    this.revolver.rotation.x = THREE.MathUtils.lerp(this.revolver.rotation.x, -0.2, 15 * deltaTime);
                }
            }

            attack() {
                if (this.attackTimer > 0) return;

                if (this.currentWeapon === 'sword') {
                    this.attackTimer = 0.3;
                    this.sword.rotation.z = -Math.PI / 1.5; 
                    this.sword.rotation.x = -Math.PI / 4;
                    
                    let hit = false;
                    entities.forEach(e => {
                        if (e.mesh.position.distanceTo(camera.position) < 8) {
                            const dirToEnemy = new THREE.Vector3().subVectors(e.mesh.position, camera.position).normalize();
                            const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                            if (camDir.dot(dirToEnemy) > 0.4) {
                                e.takeDamage(5);
                                this.hp = Math.min(100, this.hp + 5);
                                hit = true;
                            }
                        }
                    });
                    if (hit) { addStyle('+SWORD SLASH', 40); shakeIntensity = 0.2; }
                } 
                else if (this.currentWeapon === 'rocket') {
                    this.attackTimer = 0.8;
                    this.rocket.position.z += 0.5;
                    this.rocket.rotation.x -= 0.3;
                    
                    const rMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.8), new THREE.MeshLambertMaterial({color:0x333333}));
                    rMesh.position.copy(camera.position);
                    const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                    rMesh.position.addScaledVector(camDir, 2);
                    rMesh.lookAt(rMesh.position.clone().add(camDir));
                    scene.add(rMesh);
                    projectiles.push({ mesh: rMesh, vel: camDir.multiplyScalar(50), isPlayer: true, type: 'rocket', life: 3 });
                }
                else if (this.currentWeapon === 'revolver') {
                    this.attackTimer = 0.3;
                    this.revolver.position.z += 0.4;
                    this.revolver.rotation.x += 0.4;

                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

                    let hitCoin = null;
                    for (let i = 0; i < coins.length; i++) {
                        if (raycaster.intersectObject(coins[i].mesh).length > 0) { hitCoin = coins[i]; break; }
                    }

                    if (hitCoin) {
                        scene.remove(hitCoin.mesh);
                        coins.splice(coins.indexOf(hitCoin), 1);
                        addStyle('+RICOSHOT', 150);
                        
                        let target = null;
                        let minDist = Infinity;
                        entities.forEach(e => {
                            let d = hitCoin.mesh.position.distanceTo(e.mesh.position);
                            if(d < minDist) { minDist = d; target = e; }
                        });

                        if (target) {
                            target.takeDamage(18);
                            const mat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 3 });
                            const pts = [hitCoin.mesh.position.clone(), target.mesh.position.clone().add(new THREE.Vector3(0,3,0))];
                            const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
                            scene.add(line);
                            setTimeout(()=>scene.remove(line), 100);
                        }
                    } else {
                        entities.forEach(e => {
                            const intersects = raycaster.intersectObjects(e.mesh.children, true);
                            if (intersects.length > 0) { e.takeDamage(4); }
                        });
                        
                        const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                        const mat = new THREE.LineBasicMaterial({ color: 0xaaaaaa });
                        const pts = [camera.position.clone().addScaledVector(camDir, 1), camera.position.clone().addScaledVector(camDir, 60)];
                        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
                        scene.add(line);
                        setTimeout(()=>scene.remove(line), 50);
                    }
                }
            }

            jump() {
                if (this.isGrounded) {
                    this.vel.y = this.jumpForce;
                    this.isGrounded = false;
                    this.jumpCount = 1;
                } else if (this.jumpCount === 1) {
                    this.vel.y = this.jumpForce * 1.1;
                    this.jumpCount = 2;
                    addStyle('+DOUBLE JUMP', 20);
                }
            }

            dash() {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                this.vel.x = dir.x * 70;
                this.vel.z = dir.z * 70;
                addStyle('+DASH', 10);
                shakeIntensity = 0.3;
            }
        }

        // --- ENEMY CLASS (Classic Noobs) ---
        class Enemy {
            constructor(type, level) {
                this.type = type;
                this.mesh = new THREE.Group();
                this.speed = (type === 'juggernaut' ? 6 : 12) + level * 0.5;
                this.maxHp = type === 'juggernaut' ? 25 + level*3 : 6 + level;
                if(type === 'boss') this.maxHp = 60 + level*6;
                this.hp = this.maxHp;
                this.attackTimer = 0;

                const scale = type === 'boss' ? 2.5 : type === 'juggernaut' ? 1.5 : 1;

                // Classic Colors
                let colHead = 0xf5cd30; // Yellow
                let colTorso = 0x0d69ac; // Blue
                let colLimbs = 0x27462d; // Green

                if (type === 'gunman') { colTorso = 0x880000; }
                if (type === 'juggernaut') { colHead = 0x555555; colTorso = 0x222222; colLimbs = 0x111111; }
                if (type === 'boss') { colTorso = 0x550000; colHead = 0xff0000; }

                this.parts = [];

                const mHead = new THREE.MeshStandardMaterial({color: colHead});
                const mTorso = new THREE.MeshStandardMaterial({color: colTorso});
                const mLeg = new THREE.MeshStandardMaterial({color: colLimbs});

                // Build Body Parts
                const torso = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 1), mTorso);
                torso.position.y = 3;
                const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), mHead);
                head.position.y = 4.6;
                const armL = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mHead);
                armL.position.set(-1.5, 3, 0);
                const armR = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mHead);
                armR.position.set(1.5, 3, 0);
                const legL = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mLeg);
                legL.position.set(-0.5, 1, 0);
                const legR = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mLeg);
                legR.position.set(0.5, 1, 0);

                [torso, head, armL, armR, legL, legR].forEach(p => {
                    p.castShadow = true;
                    p.scale.setScalar(scale);
                    p.position.multiplyScalar(scale);
                    this.mesh.add(p);
                    this.parts.push(p);
                });

                if (type !== 'boss') {
                    this.hpBg = new THREE.Mesh(new THREE.PlaneGeometry(3*scale, 0.3*scale), new THREE.MeshBasicMaterial({color: 0x000000}));
                    this.hpBg.position.y = 5.5 * scale;
                    this.hpFill = new THREE.Mesh(new THREE.PlaneGeometry(3*scale, 0.3*scale), new THREE.MeshBasicMaterial({color: 0x00ff00}));
                    this.hpFill.position.set(0, 5.5 * scale, 0.05);
                    this.mesh.add(this.hpBg, this.hpFill);
                }

                let x = (Math.random()-0.5)*100; let z = (Math.random()-0.5)*100;
                if(Math.abs(x)<20) x = 30 * Math.sign(x||1);
                this.mesh.position.set(x, 0, z);
                scene.add(this.mesh);
                entities.push(this);
            }

            takeDamage(amt) {
                this.hp -= amt;
                this.parts.forEach(p => {
                    p.material.emissive.setHex(0xffffff);
                    setTimeout(() => { if(p.material) p.material.emissive.setHex(0x000000); }, 100);
                });

                if (this.type === 'boss') {
                    document.getElementById('boss-hp-fill').style.width = Math.max(0, (this.hp/this.maxHp)*100) + '%';
                } else {
                    this.hpFill.scale.x = Math.max(0, this.hp / this.maxHp);
                    this.hpFill.position.x = -1.5 * this.mesh.children[0].scale.x * (1 - this.hpFill.scale.x);
                    this.hpFill.material.color.setHex(this.hp < this.maxHp/2 ? 0xff0000 : 0x00ff00);
                }

                if (this.hp <= 0) this.die();
            }

            die() {
                // Break into physical gibs
                this.parts.forEach(part => {
                    const gib = new THREE.Mesh(part.geometry, part.material);
                    gib.position.copy(this.mesh.position).add(part.position);
                    gib.scale.copy(part.scale);
                    scene.add(gib);
                    
                    const vel = new THREE.Vector3((Math.random()-0.5)*20, Math.random()*20+10, (Math.random()-0.5)*20);
                    const rotVel = new THREE.Vector3(Math.random()*5, Math.random()*5, Math.random()*5);
                    gibs.push({ mesh: gib, vel: vel, rotVel: rotVel, life: 4 });
                });

                scene.remove(this.mesh);
                entities.splice(entities.indexOf(this), 1);
                addStyle('+DISMANTLED', 50);
                if(this.type === 'boss') {
                    addStyle('+BOSS DEFEATED', 500);
                    document.getElementById('boss-banner').style.display = 'none';
                }

                if (entities.length === 0) {
                    GameMode.level++;
                    setTimeout(() => GameMode.generateWave(), 2000);
                }
            }

            update() {
                this.mesh.lookAt(camera.position.x, this.mesh.position.y, camera.position.z);
                if(this.hpBg) {
                    this.hpBg.lookAt(camera.position);
                    this.hpFill.lookAt(camera.position);
                }

                const dist = this.mesh.position.distanceTo(camera.position);
                this.attackTimer -= deltaTime;

                // Bobbing animation
                this.mesh.position.y = Math.abs(Math.sin(clock.getElapsedTime() * 8)) * 0.5;

                if (this.type === 'gunman' || this.type === 'boss') {
                    if (dist > 25) {
                        this.mesh.translateZ(this.speed * deltaTime);
                    } else if (this.attackTimer <= 0) {
                        this.attackTimer = this.type === 'boss' ? 1.0 : 2.5;
                        const p = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), new THREE.MeshBasicMaterial({color:0xffff00}));
                        p.position.copy(this.mesh.position).add(new THREE.Vector3(0, 4, 0));
                        const dir = new THREE.Vector3().subVectors(camera.position, p.position).normalize();
                        scene.add(p);
                        projectiles.push({ mesh: p, vel: dir.multiplyScalar(35), isPlayer: false, life: 4 });
                    }
                } else {
                    if (dist > 4) {
                        this.mesh.translateZ(this.speed * deltaTime);
                    } else if (this.attackTimer <= 0) {
                        this.attackTimer = 1.5;
                        player.takeDamage(this.type === 'juggernaut' ? 30 : 15);
                    }
                }
            }
        }

        // --- GAME LOGIC & ENVIRONMENT ---
        const GameMode = {
            level: 1,
            generateWave: function() {
                entities.forEach(e => scene.remove(e.mesh)); entities.length = 0;
                projectiles.forEach(p => scene.remove(p.mesh)); projectiles.length = 0;
                coins.forEach(c => scene.remove(c.mesh)); coins.length = 0;
                
                // Arena Generation
                mapObjects.forEach(m => scene.remove(m)); mapObjects.length = 0;
                
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshLambertMaterial({ map: classicStudTex }));
                floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
                scene.add(floor); mapObjects.push(floor);

                // Add random retro trees & ruins
                for(let i=0; i<20; i++) {
                    const trunk = new THREE.Mesh(new THREE.BoxGeometry(2, 15, 2), new THREE.MeshLambertMaterial({color: 0x5a3f22}));
                    const leaves = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), new THREE.MeshLambertMaterial({color: 0x1f5c22}));
                    leaves.position.y = 10; trunk.add(leaves);
                    
                    let tx = (Math.random()-0.5)*250; let tz = (Math.random()-0.5)*250;
                    if(Math.abs(tx)<40 && Math.abs(tz)<40) { tx += 50; } // Keep middle clear
                    trunk.position.set(tx, 7.5, tz);
                    trunk.castShadow = true; leaves.castShadow = true;
                    scene.add(trunk); mapObjects.push(trunk);
                }

                player.hp = 100; player.takeDamage(0); // reset bar

                if (this.level % 5 === 0) {
                    new Enemy('boss', this.level);
                    document.getElementById('boss-banner').style.display = 'block';
                    document.getElementById('boss-title').innerText = 'WAVE ' + this.level + ' BOSS: THE NOOB KING';
                    document.getElementById('boss-hp-fill').style.width = '100%';
                } else {
                    const count = 4 + Math.floor(this.level * 1.5);
                    const types = ['basic', 'basic', 'gunman', 'juggernaut'];
                    for(let i=0; i<count; i++) {
                        let t = types[Math.floor(Math.random() * Math.min(types.length, 1 + this.level/3))];
                        new Enemy(t, this.level);
                    }
                }
                document.getElementById('level-val').innerText = this.level;
            }
        };

        // --- INPUT HANDLING ---
        const keys = {};
        let yaw = 0, pitch = 0;

        document.getElementById('start-btn').addEventListener('click', () => {
            document.body.requestPointerLock();
            if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        });
        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === document.body;
            document.getElementById('overlay').style.display = isPointerLocked ? 'none' : 'flex';
            if(isPointerLocked) clock.getDelta();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isPointerLocked) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
            camera.rotation.order = 'YXZ';
            camera.rotation.set(pitch, yaw, 0);
        });

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(!isPointerLocked) return;
            if(e.key === '1') player.switchWeapon('sword');
            if(e.key === '2') player.switchWeapon('rocket');
            if(e.key === '3') player.switchWeapon('revolver');
            if(e.code === 'Space') player.jump();
            if(e.code === 'ShiftLeft') player.dash();
            
            if(e.code === 'KeyE') {
                const c = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 12), new THREE.MeshLambertMaterial({color:0xffcc00}));
                c.position.copy(camera.position);
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                c.position.addScaledVector(dir, 1.5); c.rotation.x = Math.PI/2;
                scene.add(c);
                coins.push({mesh: c, vel: dir.multiplyScalar(20).add(new THREE.Vector3(0,15,0)), life: 4});
                addStyle('+COIN TOSS', 10);
            }

            if(e.code === 'KeyF') {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 2), new THREE.MeshLambertMaterial({color:0x333333}));
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y=0; dir.normalize();
                w.position.copy(camera.position).addScaledVector(dir, 6);
                w.position.y = 3; w.rotation.y = Math.atan2(dir.x, dir.z);
                scene.add(w); mapObjects.push(w);
            }
        });
        document.addEventListener('keyup', e => keys[e.code] = false);
        document.addEventListener('mousedown', e => { if(isPointerLocked && e.button===0) player.attack(); });


        // --- MAIN LOOP ---
        const player = new Player();
        GameMode.generateWave();

        function animate() {
            requestAnimationFrame(animate);
            if (!isPointerLocked) return;

            deltaTime = Math.min(clock.getDelta(), 0.05);

            player.updatePhysics();
            updateStyleMeter();
            applyScreenShake();

            document.getElementById('enemy-val').innerText = entities.length;

            for(let i = entities.length-1; i>=0; i--) { entities[i].update(); }

            // Gibs Physics
            for(let i = gibs.length-1; i>=0; i--) {
                const g = gibs[i];
                g.vel.y -= player.gravity * deltaTime;
                g.mesh.position.addScaledVector(g.vel, deltaTime);
                g.mesh.rotation.x += g.rotVel.x * deltaTime;
                g.mesh.rotation.y += g.rotVel.y * deltaTime;
                
                if (g.mesh.position.y <= g.mesh.scale.y/2) {
                    g.mesh.position.y = g.mesh.scale.y/2;
                    g.vel.y *= -0.5; // Bounce
                    g.vel.x *= 0.8; g.vel.z *= 0.8; // Friction
                }

                g.life -= deltaTime;
                if(g.life <= 0) {
                    scene.remove(g.mesh);
                    gibs.splice(i, 1);
                }
            }

            // Projectiles
            for(let i = projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.addScaledVector(p.vel, deltaTime);
                p.life -= deltaTime;
                
                let hit = false;
                if(p.isPlayer) {
                    if(p.type === 'rocket') {
                        if(p.mesh.position.y <= 0) hit = true;
                        entities.forEach(e => { if(!hit && p.mesh.position.distanceTo(e.mesh.position) < 4) hit = true; });

                        if(hit || p.life <= 0) {
                            shakeIntensity = 1.0;
                            entities.forEach(e => {
                                if(e.mesh.position.distanceTo(p.mesh.position) < 12) { e.takeDamage(15); addStyle('+EXPLOSION', 40); }
                            });
                            if(camera.position.distanceTo(p.mesh.position) < 8) {
                                const push = new THREE.Vector3().subVectors(camera.position, p.mesh.position).normalize();
                                player.vel.addScaledVector(push, 50); player.takeDamage(10); addStyle('+ROCKET JUMP', 100);
                            }
                        }
                    }
                } else {
                    if(p.mesh.position.distanceTo(camera.position) < 3) { player.takeDamage(20); hit = true; }
                }

                if(hit || p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
            }

            // Coins
            for(let i = coins.length-1; i>=0; i--) {
                const c = coins[i];
                c.vel.y -= player.gravity * deltaTime;
                c.mesh.position.addScaledVector(c.vel, deltaTime);
                c.mesh.rotation.y += 15 * deltaTime;
                c.life -= deltaTime;
                if(c.mesh.position.y < 0 || c.life <= 0) { scene.remove(c.mesh); coins.splice(i, 1); }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
